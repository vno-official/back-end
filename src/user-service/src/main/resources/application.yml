server:
  port: 8082

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    url: /api/users/v3/api-docs  # 👈 URL khi qua gateway
    config-url: /api/users/v3/api-docs/swagger-config
  server:
    url: http://localhost:8080/api/users  # 👈 Base URL qua gateway

spring:
  application:
    name: user-service
  cloud:
    config:
      enabled: false
  datasource:
    url: ${DB_URL:jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:eureka-secret@localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
