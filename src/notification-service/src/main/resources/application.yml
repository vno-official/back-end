server:
  port: 8084

spring:
  application:
    name: notification-service

  # Database (H2 cho dev, PostgreSQL cho prod)
  datasource:
    url: jdbc:h2:mem:notedb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop # dev only
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # Flyway (nếu dùng migration)
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Spring Cloud Config (nếu dùng Config Server)
# spring:
#   cloud:
#     config:
#       enabled: true
#       uri: http://localhost:8888

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka-secret@localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.vno.note: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

# SpringDoc OpenAPI (Swagger)
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui/index.html
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: com.vno.note.controller
  paths-to-match: /api/notes/**

# Custom App Config
app:
  note:
    max-title-length: 200
    max-content-length: 5000