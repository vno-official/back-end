server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: file:D:/side-projects/vno-backend/config-repo/
        # Git configuration (for production)
        git:
          uri: ${CONFIG_REPO_URI:https://github.com/your-org/config-repo.git}
          search-paths: '{application}'
          username: ${GIT_USERNAME:}
          password: ${GIT_PASSWORD:}
          default-label: main
  security:
    user:
      name: ${CONFIG_SERVER_USER:config}
      password: ${CONFIG_SERVER_PASSWORD:config123}

# Eureka Discovery
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka:eureka-secret@localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Actuator Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,restart,env
  endpoint:
    health:
      show-details: always
  # THÊM DÒNG NÀY ĐỂ TẮT TRACING - FIX LỖI ZIPKIN
  tracing:
    enabled: false

logging:
  level:
    org.springframework.cloud.config: DEBUG
    org.springframework.security: INFO
