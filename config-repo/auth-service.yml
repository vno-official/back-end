server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vno_auth}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration/postgres

# JWT Configuration
jwt:
  secret-key: ${JWT_SECRET:dGhpc2lzYXZlcnlzZWNyZXRrZXl0aGF0c2hvdWxkYmVjaGFuZ2VkaW5wcm9kdWN0aW9uMTIzNDU2Nzg5MA==}
  issuer: vno-auth-service
  access-token:
    expiration: ${JWT_ACCESS_EXPIRATION:3600000} # 1 hour
  refresh-token:
    expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days

# Security
security:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}

# Feign clients
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: basic
      user-service:
        url: http://user-service

logging:
  level:
    com.vno.auth: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
