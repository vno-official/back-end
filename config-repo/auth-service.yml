# config-repo/auth-service.yml (Cấu hình cho auth-service)

# 1. Cổng
server:
  port: 8081

# 2. Cấu hình Cơ sở dữ liệu
spring:
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  security:
    user:
      name: admin
      password: 123456

# 3. Cấu hình Springdoc OpenAPI/Swagger UI
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: com.vno.auth.controller
  paths-to-match: /api/**
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

# 4. Cấu hình Eureka
eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:eureka-secret@localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# 5. Cấu hình khác
management:
  tracing:
    enabled: false

jwt:
  secret-key: dGhpc2lzYXZlcnlzZWNyZXRrZXl0aGF0c2hvdWxkYmVjaGFuZ2VkaW5wcm9kdWN0aW9uMTIzNDU2Nzg5MA==
  issuer: vno-auth-service
  access-token:
    expiration: 3600000
  refresh-token:
    expiration: 604800000