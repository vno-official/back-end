server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  security:
    user:
      name: admin
      password: 123456

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

  # CRITICAL: Scan your controller packages
  packages-to-scan: com.vno.auth.controller
  # OR if controllers are in subpackages:
  # packages-to-scan: com.vno.auth

  # Optional: Group name (must match service ID)
  group: auth-service

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:eureka-secret@localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  tracing:
    enabled: false

jwt:
  secret-key: dGhpc2lzYXZlcnlzZWNyZXRrZXl0aGF0c2hvdWxkYmVjaGFuZ2VkaW5wcm9kdWN0aW5wcm9kdWN0aW9uMTIzNDU2Nzg5MA==
  issuer: vno-auth-service
  access-token:
    expiration: 3600000
  refresh-token:
    expiration: 604800000
