server:
  port: 8085

spring:
  application:
    name: tag-service

jwt:
  secret: ${JWT_SECRET:dGhpc2lzYXZlcnlzZWNyZXRrZXl0aGF0c2hvdWxkYmVjaGFuZ2VkaW5wcm9kdWN0aW9uMTIzNDU2Nzg5MA==}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka:eureka-secret@localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true



management:
  endpoints:
    web:
      exposure:
        include: health,info,openapi,swagger-ui  # thêm openapi + swagger-ui
  info:
    env:
      enabled: true  # enable /actuator/info
  endpoint:
    health:
      show-details: always