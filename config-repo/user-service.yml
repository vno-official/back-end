server:
  port: 8082

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vno_users}
    driver-class-name: org.postgresql.Driver
    username: vno_user_2025
    password: vno@user-2025
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    user:
      name: admin
      password: 123456


 
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

  # CRITICAL: Scan your controller packages
  packages-to-scan: com.vno.user.controller
  # OR if controllers are in subpackages:
  # packages-to-scan: com.vno.auth

  # Optional: Group name (must match service ID)
  group: user-service

management:
  zipkin:
    tracing:
      enabled: false
      
# Email verification settings
email:
  verification:
    code-length: 6
    expiration-minutes: 15
    max-attempts: 3

# Mock email service (for development)
mock:
  email:
    enabled: ${MOCK_EMAIL:true}
    log-only: true

logging:
  level:
    com.vno.user: DEBUG
    org.hibernate.SQL: DEBUG
