server:
  port: 8082

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  security:
    user:
      name: admin
      password: 123456



springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

  # CRITICAL: Scan your controller packages
  packages-to-scan: com.vno.user.controller
  # OR if controllers are in subpackages:
  # packages-to-scan: com.vno.auth

  # Optional: Group name (must match service ID)
  group: user-service

management:
  zipkin:
    tracing:
      enabled: false
      
# Email verification settings
email:
  verification:
    code-length: 6
    expiration-minutes: 15
    max-attempts: 3

# Mock email service (for development)
mock:
  email:
    enabled: ${MOCK_EMAIL:true}
    log-only: true

logging:
  level:
    com.vno.user: DEBUG
    org.hibernate.SQL: DEBUG
