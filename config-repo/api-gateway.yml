server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:http://192.168.56.1:8888"
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081/
          predicates:
            - Path=/api-docs/auth-service
        - id: user-service
          uri: http://localhost:8082/
          predicates:
            - Path=/api-docs/user-service
      config:
        uri: http://192.168.56.1:8888
        fail-fast: true
        retry:
          maxAttempts: 3
  security:
  oauth2:
    resourceserver:
      jwt:
        jwk-set-uri: placeholder-uri-to-be-overridden

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    urls: []  # Remove hardcoded URLs — let discovery do the work

  # Enable service discovery for OpenAPI aggregation
  group-configs:
    - group: all-services
      packages-to-scan: com.vno  # Optional: filter by package
      paths-to-match: /**

  # Automatically discover OpenAPI from registered services
  swagger-ui:
    urls:
      - name: auth-service
        url: /api/auth/v3/api-docs
      - name: user-service
        url: /api/users/v3/api-docs

jwt:
  secret: ${JWT_SECRET:dGhpc2lzYXZlcnlzZWNyZXRrZXl0aGF0c2hvdWxkYmVjaGFuZ2VkaW5wcm9kdWN0aW9uMTIzNDU2Nzg5MA==}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka:eureka-secret@localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true



management:
  endpoints:
    web:
      exposure:
        include: health,info,openapi,swagger-ui  # thêm openapi + swagger-ui
  info:
    env:
      enabled: true  # enable /actuator/info
  endpoint:
    health:
      show-details: always