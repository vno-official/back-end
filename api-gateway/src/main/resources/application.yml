server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true
  config:
    import: "optional:configserver:http://config:config123@localhost:8888"
  cloud:
    gateway:
      routes:
        # 1. ROUTE API THỰC TẾ CHO AUTH-SERVICE
        - id: auth_service_route
          uri: lb://auth-service # lb://auth-service: Sử dụng Load Balancer (Eureka) để tìm dịch vụ
          predicates:
            - Path=/api/auth/** # Bất kỳ yêu cầu nào bắt đầu bằng /api/auth sẽ được chuyển tiếp
          filters:
            # - StripPrefix=1 # (Tùy chọn: nếu API Auth không có /api/auth trong controller)
            # Thường bạn có thể cần thêm các filter như JwtAuthenticationFilter tại đây.
  security:
    user:
      name: admin
      password: 123456
    basic:
      enabled: false
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/realms/master/protocol/openid-connect/certs
 
# application.yml của api-gateway
springdoc:
  swagger-ui:
    # 1. Kích hoạt tính năng tổng hợp
    url: /v3/api-docs/swagger-config 
    # 2. Định nghĩa danh sách các tài liệu con
    urls:
      - name: Auth Service 🔐 # Tên hiển thị trên dropdown menu
        url: /v3/api-docs/auth-service # URL ảo mà Gateway sẽ tạo ra
      - name: User Service 🔐 # Tên hiển thị trên dropdown menu
        url: /v3/api-docs/user-service # URL ảo mà Gateway sẽ tạo ra
        
      # (Sau này thêm User Service vào đây)
      # - name: User Service 🧑
      #   url: /v3/api-docs/user-service

management:
  tracing:
    enabled: false
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

eureka:
  instance:
    preferIpAddress: true
    hostname: localhost
    leaseRenewalIntervalInSeconds: 10
    health-check-url-path: /actuator/health
  client:
    serviceUrl:
      defaultZone: http://eureka:eureka-secret@localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
