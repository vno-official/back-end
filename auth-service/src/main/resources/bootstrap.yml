spring:
  application:
    name: auth-service
  cloud:
    config:
      uri: ${CONFIG_SERVER_URI:http://localhost:8888}
      username: ${CONFIG_SERVER_USER:config}
      password: ${CONFIG_SERVER_PASSWORD:config123}
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 2000
        max-interval: 5000
        multiplier: 1.5
